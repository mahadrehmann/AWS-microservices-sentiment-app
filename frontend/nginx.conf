# =============================================================================
# Nginx configuration for the SentimentAI Frontend
# =============================================================================
#
# Key routing rule (Kubernetes-ready):
#   /api/   →   http://backend:8000/
#
# In Docker Compose, "backend" is the compose service name.
# In Kubernetes, replace "backend" with the K8s Service DNS entry:
#   e.g. http://sentiment-backend-svc.default.svc.cluster.local:8000/
#
# No changes to index.html or app.js are needed when switching environments.
# =============================================================================

upstream backend_service {
    # Docker Compose resolves "backend" via the shared bridge network.
    # K8s: change to your Service name, e.g. sentiment-backend-svc:8000
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    # ── Static Assets ────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 256;

    # Cache static assets aggressively
    location ~* \.(css|js|ico|png|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── API Reverse Proxy ────────────────────────────────────────────────
    # The /api/ prefix is stripped, so /api/analyze → /analyze on the backend.
    location /api/ {
        proxy_pass http://backend_service/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts: DistilBERT inference can take a few seconds on CPU
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;

        # Disable buffering for streaming-friendly responses
        proxy_buffering off;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security Headers ─────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY"    always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}
