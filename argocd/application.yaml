apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sentiment-analysis-app
  namespace: argocd
spec:
  project: default
  source:
    # Replace YOUR_GITHUB_USERNAME with your actual GitHub username
    repoURL: https://github.com/mahadrehmann/AWS-microservices-sentiment-app.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
