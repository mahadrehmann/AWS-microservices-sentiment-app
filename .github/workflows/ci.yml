name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: docker.io/${{ secrets.DOCKER_USERNAME }}/cloud-project-backend:${{ github.sha }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: docker.io/${{ secrets.DOCKER_USERNAME }}/cloud-project-frontend:${{ github.sha }}

      - name: Update Kubernetes Manifests
        run: |
          # Replace placeholder YOUR_DOCKER_USERNAME image tags with the newly built Git SHA tags
          sed -i "s|image: YOUR_DOCKER_USERNAME/cloud-project-backend:latest|image: docker.io/${{ secrets.DOCKER_USERNAME }}/cloud-project-backend:${{ github.sha }}|g" k8s/backend.yaml
          sed -i "s|image: YOUR_DOCKER_USERNAME/cloud-project-frontend:latest|image: docker.io/${{ secrets.DOCKER_USERNAME }}/cloud-project-frontend:${{ github.sha }}|g" k8s/frontend.yaml

      - name: Commit and Push Updated Manifests
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add k8s/backend.yaml k8s/frontend.yaml
          git commit -m "Update Kubernetes manifests with image tag ${{ github.sha }} [skip ci]"
          git push
