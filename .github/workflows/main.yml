name: Build and Publish Images

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      REGISTRY: docker.io
      DOCKERHUB_USER: ${{ secrets.DOCKER_USERNAME }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            docker.io/${{ env.DOCKERHUB_USER }}/cloud-project-backend:${{ env.IMAGE_TAG }}
            docker.io/${{ env.DOCKERHUB_USER }}/cloud-project-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            docker.io/${{ env.DOCKERHUB_USER }}/cloud-project-frontend:${{ env.IMAGE_TAG }}
            docker.io/${{ env.DOCKERHUB_USER }}/cloud-project-frontend:latest

      - name: Update Kubernetes image tags
        run: |
          sed -i -E "s|docker.io/${DOCKERHUB_USER}/cloud-project-backend:[A-Za-z0-9._-]+|docker.io/${DOCKERHUB_USER}/cloud-project-backend:${IMAGE_TAG}|g" k8s/backend.yaml
          sed -i -E "s|docker.io/${DOCKERHUB_USER}/cloud-project-frontend:[A-Za-z0-9._-]+|docker.io/${DOCKERHUB_USER}/cloud-project-frontend:${IMAGE_TAG}|g" k8s/frontend.yaml
          echo "Updated manifest files:"
          grep "image:" k8s/backend.yaml k8s/frontend.yaml

      - name: Commit and push manifest updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          CHANGES=$(git status -s -- k8s/backend.yaml k8s/frontend.yaml)
          if [[ -z "$CHANGES" ]]; then
            echo "No manifest changes detected. Skipping commit."
            exit 0
          fi

          echo "Changes detected:"
          echo "$CHANGES"
          git add k8s/backend.yaml k8s/frontend.yaml
          git commit -m "Update image tags to ${IMAGE_TAG} [skip ci]"
          git push